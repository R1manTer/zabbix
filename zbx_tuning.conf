# =============================================================================
# PostgreSQL Tuning для Zabbix 7.0 LTS
# Система: 16 GB RAM | RAID 5 (SAS) | 500+ хостів
# Підключається через: include_if_exists в postgresql.conf
# =============================================================================

# --- Пам'ять ---
# shared_buffers = 25% від доступної RAM (контейнер має ліміт 4 GB)
shared_buffers = 1GB

# Ефективний розмір кешу ОС (підказка планувальнику запитів)
effective_cache_size = 3GB

# Пам'ять для сортування/хешування на з'єднання
work_mem = 16MB

# Пам'ять для DDL операцій (CREATE INDEX, VACUUM, etc.)
maintenance_work_mem = 256MB

# --- WAL та Checkpoint (критично для RAID 5 I/O Wait) ---
# Більше WAL у пам'яті → менше I/O операцій
wal_buffers = 64MB

# Checkpoint кожні 15 хвилин або 512 MB WAL
checkpoint_timeout = 15min
max_wal_size = 512MB
min_wal_size = 128MB

# Розмазати checkpoint по часу → знижує пікове навантаження на RAID
checkpoint_completion_target = 0.9

# --- Паралелізм ---
max_worker_processes = 4
max_parallel_workers = 4
max_parallel_workers_per_gather = 2

# --- З'єднання ---
# Zabbix Server + Web + резерв
max_connections = 100

# --- Планувальник запитів ---
# Для SAS RAID (sequential I/O краще за random)
random_page_cost = 2.0
seq_page_cost = 1.0

# Очікувана ефективна швидкість диску (MB/s)
effective_io_concurrency = 4

# --- Autovacuum — агресивний для Zabbix (багато INSERT/DELETE) ---
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s

# Запускати autovacuum раніше (менше bloat)
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# Обмеження швидкості autovacuum (щоб не блокував основні запити)
autovacuum_vacuum_cost_delay = 5ms
autovacuum_vacuum_cost_limit = 400

# --- Логування (тільки повільні запити, щоб не засмічувати диск) ---
log_min_duration_statement = 1000   # Логувати запити > 1 сек
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0

# --- Статистика ---
track_activities = on
track_counts = on
track_io_timing = on

# --- Локалізація ---
timezone = 'Europe/Kiev'
